<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAS OBFUSCATOR</title>
    <style>
        :root {
            --primary: #ffffff;
            --background: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .intro-logo {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            opacity: 0;
            transform: translateY(20px);
            animation: introFadeIn 1s forwards 0.2s;
        }

        .yas {
            color: var(--primary);
        }

        .obfuscator {
            color: #ffffff;
            font-weight: 300;
        }

        .intro-line {
            width: 0;
            height: 2px;
            background: #ffffff;
            margin-top: 1rem;
            animation: lineExtend 1.5s cubic-bezier(0.65, 0, 0.35, 1) forwards 0.5s;
        }

        @keyframes introFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes lineExtend {
            to {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Intro Animation Overlay -->
    <div id="intro-overlay">
        <div class="intro-logo">
            <span class="yas">YAS</span><span class="obfuscator">OBFUSCATOR</span>
        </div>
        <div class="intro-line"></div>
    </div>

    <script>
        // Redirect after the intro animation finishes
        setTimeout(() => {
            window.location.href = "https://yasluauobfuscator.netlify.app/";
        }, 2500);
    </script>
</body>
</html>
