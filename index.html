<!DOCTYPE html>
<html lang="en">
<head>

<body oncontextmenu="return false;">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="glass">
        <div class="logo">

        </div>
        <div class="nav-links">
            <a href="#" class="active">Secure</a>
            <a href="#">Pricing</a>
            <a href="#">Documentation</a>
        </div>
    </nav>

    <main>
        <div class="container glass">
            <header class="hero">
                <div class="big-yas">YAS</div>

                    <textarea id="output-script" spellcheck="false" readonly placeholder="Output will appear here..."></textarea>
                    <div class="copy-float" id="copy-btn">Copy to Clipboard</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Custom Context Menu -->
    <div id="custom-menu" class="glass hidden">
        <div class="menu-item" id="menu-copy">Copy Selection</div>
        <div class="menu-item" id="menu-paste">Paste From Clipboard</div>
